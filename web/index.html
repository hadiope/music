<!DOCTYPE html>
<html lang="fa">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Iran Seda - اپلیکیشن موسیقی ایرانی. گوش دادن به آهنگ‌های ایرانی، ساخت پلی‌لیست، اشتراک‌گذاری با دوستان">
  <meta name="theme-color" content="#1DB954">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Iran Seda">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Iran Seda | موسیقی ایرانی</title>
  <link rel="manifest" href="manifest.json">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Vazirmatn', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .bg-gradient {
      position: fixed; inset: 0; z-index: -1;
      background:
        radial-gradient(ellipse at top, rgba(29, 185, 84, 0.15), transparent 60%),
        radial-gradient(ellipse at bottom, rgba(30, 215, 96, 0.08), transparent 60%),
        #0a0a0a;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 32px 24px;
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .logo {
      width: 120px; height: 120px;
      margin: 0 auto 28px;
      background: linear-gradient(135deg, #1DB954, #1ED760);
      border-radius: 28px;
      display: flex; align-items: center; justify-content: center;
      font-size: 60px;
      box-shadow: 0 12px 48px rgba(29, 185, 84, 0.35);
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 12px 48px rgba(29, 185, 84, 0.35); }
      50% { transform: scale(1.03); box-shadow: 0 16px 56px rgba(29, 185, 84, 0.5); }
    }
    h1 { font-size: 36px; margin-bottom: 8px; font-weight: 800; letter-spacing: -0.5px; }
    .subtitle { font-size: 17px; color: #B3B3B3; margin-bottom: 36px; line-height: 1.6; max-width: 400px; }
    .btn-open {
      display: inline-flex; align-items: center; gap: 8px;
      background: #1DB954;
      color: #000;
      padding: 16px 48px;
      border-radius: 32px;
      text-decoration: none;
      font-weight: 700;
      font-size: 18px;
      transition: all 0.2s;
      box-shadow: 0 4px 24px rgba(29, 185, 84, 0.3);
      border: none;
      cursor: pointer;
    }
    .btn-open:hover { transform: scale(1.05); box-shadow: 0 8px 32px rgba(29, 185, 84, 0.5); }
    .btn-download {
      display: inline-flex; align-items: center; gap: 8px;
      color: #B3B3B3;
      padding: 12px 32px;
      border-radius: 28px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      margin-top: 16px;
      border: 1px solid rgba(255,255,255,0.15);
      transition: all 0.2s;
    }
    .btn-download:hover { color: #fff; border-color: rgba(255,255,255,0.3); }
    .features {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 16px; margin-top: 48px; max-width: 500px; width: 100%;
    }
    .feature { text-align: center; padding: 16px 8px; background: rgba(255,255,255,0.04); border-radius: 16px; }
    .feature-icon { font-size: 32px; margin-bottom: 8px; }
    .feature-title { font-size: 14px; font-weight: 600; color: #1DB954; margin-bottom: 4px; }
    .feature-desc { font-size: 12px; color: #888; line-height: 1.4; }
    .status { color: #B3B3B3; font-size: 14px; margin-top: 24px; min-height: 20px; }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(29, 185, 84, 0.2);
      border-top-color: #1DB954;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block; vertical-align: middle; margin-left: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer { margin-top: 48px; color: #555; font-size: 13px; }
    a { color: #1DB954; text-decoration: none; }
    .fade-in { animation: fadeIn 0.8s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="container fade-in">
    <div class="logo">🎵</div>
    <h1>Iran Seda</h1>
    <p class="subtitle">اپلیکیشن موسیقی ایرانی<br>گوش بده، کشف کن، به اشتراک بذار</p>

    <button class="btn-open" onclick="openApp()" id="openBtn">
      🚀 باز کردن اپ
    </button>
    <br>
    <a class="btn-download" href="https://github.com/hadiope/music/releases/latest" id="downloadBtn">
      📱 دانلود اپ (APK)
    </a>

    <div class="status" id="status"></div>

    <div class="features">
      <div class="feature">
        <div class="feature-icon">🎶</div>
        <div class="feature-title">آهنگ‌های ایرانی</div>
        <div class="feature-desc">بهترین موسیقی‌ها</div>
      </div>
      <div class="feature">
        <div class="feature-icon">📚</div>
        <div class="feature-title">پلی‌لیست</div>
        <div class="feature-desc">ساخت و اشتراک</div>
      </div>
      <div class="feature">
        <div class="feature-icon">📱</div>
        <div class="feature-title">آهنگ‌های گوشی</div>
        <div class="feature-desc">با کاور و خواننده</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🔍</div>
        <div class="feature-title">جستجوی هوشمند</div>
        <div class="feature-desc">فارسی و انگلیسی</div>
      </div>
    </div>

    <div class="footer">
      Iran Seda v1.3.0 · <a href="https://github.com/hadiope/music">GitHub</a>
    </div>
  </div>

  <script>
    var playlistId = null;
    var path = window.location.pathname;
    // Path-based: /music/playlist/<id>
    if (path.indexOf('/playlist/') !== -1) {
      var parts = path.split('/playlist/');
      if (parts.length > 1) playlistId = parts[1].split('/')[0].split('?')[0];
    }
    // Hash-based: /music/#/playlist/<id>
    if (!playlistId && window.location.hash.indexOf('/playlist/') !== -1) {
      var hashParts = window.location.hash.split('/playlist/');
      if (hashParts.length > 1) playlistId = hashParts[1].split('/')[0].split('?')[0];
    }

    function openApp() {
      var status = document.getElementById('status');
      var btn = document.getElementById('openBtn');
      btn.style.opacity = '0.6';
      status.innerHTML = 'در حال باز کردن اپ... <span class="spinner"></span>';

      var deepLink = playlistId
        ? 'iranseda://playlist/' + playlistId
        : 'iranseda://';

      // Try to open the app via custom scheme
      window.location.href = deepLink;

      // If the app isn't installed, after 2.5s redirect to download page
      var timer = setTimeout(function() {
        window.location.href = 'https://github.com/hadiope/music/releases/latest';
      }, 2500);

      // If the app opens, the page becomes hidden → cancel the redirect
      document.addEventListener('visibilitychange', function() {
        if (document.hidden) clearTimeout(timer);
      });
    }

    // Auto-open if there's a playlist deep link
    if (playlistId) {
      openApp();
    }
  </script>
</body>
</html>
