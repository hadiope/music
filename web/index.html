<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Iran Seda - اپلیکیشن موسیقی ایرانی">
  <meta name="theme-color" content="#1DB954">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Iran Seda">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Iran Seda - موسیقی ایرانی</title>
  <link rel="manifest" href="manifest.json">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #121212;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 32px;
      max-width: 480px;
    }
    .logo {
      width: 96px;
      height: 96px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, #1DB954, #1ED760);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      box-shadow: 0 8px 32px rgba(29, 185, 84, 0.3);
    }
    h1 { font-size: 28px; margin-bottom: 12px; font-weight: 700; }
    .subtitle { font-size: 16px; color: #B3B3B3; margin-bottom: 32px; line-height: 1.6; }
    .btn {
      display: inline-block;
      background: #1DB954;
      color: #000;
      padding: 14px 40px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(29, 185, 84, 0.3);
    }
    .btn:hover { transform: scale(1.05); box-shadow: 0 6px 24px rgba(29, 185, 84, 0.4); }
    .redirecting { color: #B3B3B3; font-size: 14px; margin-top: 24px; }
    .spinner {
      width: 24px; height: 24px;
      border: 3px solid rgba(29, 185, 84, 0.2);
      border-top-color: #1DB954;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 16px auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🎵</div>
    <h1>Iran Seda</h1>
    <p class="subtitle">اپلیکیشن موسیقی ایرانی<br>Iranian Music Streaming App</p>
    <a href="#" class="btn" onclick="openApp()">باز کردن اپ</a>
    <div id="status" class="redirecting" style="display:none;">
      <p>در حال باز کردن اپ...</p>
      <div class="spinner"></div>
    </div>
  </div>
  <script>
    // Check if this is a playlist deep link: /music/playlist/<id>
    var path = window.location.pathname;
    var playlistId = null;

    // Path-based: /music/playlist/<id>
    if (path.includes('/playlist/')) {
      var parts = path.split('/playlist/');
      if (parts.length > 1) playlistId = parts[1].split('/')[0].split('?')[0];
    }
    // Hash-based: /music/#/playlist/<id>
    if (!playlistId && window.location.hash.startsWith('#/playlist/')) {
      var hashParts = window.location.hash.split('/playlist/');
      if (hashParts.length > 1) playlistId = hashParts[1].split('/')[0].split('?')[0];
    }

    function openApp() {
      document.getElementById('status').style.display = 'block';

      if (playlistId) {
        // Try to open the app directly with iranseda:// scheme
        window.location.href = 'iranseda://playlist/' + playlistId;

        // Fallback: if the app isn't installed, after 2 seconds redirect to
        // the GitHub releases page to download the APK
        setTimeout(function() {
          window.location.href = 'https://github.com/hadiope/music/releases/latest';
        }, 2500);
      } else {
        // No playlist ID — just open the app home
        window.location.href = 'iranseda://';
        setTimeout(function() {
          window.location.href = 'https://github.com/hadiope/music/releases/latest';
        }, 2500);
      }
      return false;
    }

    // Auto-redirect if there's a playlist ID in the URL
    if (playlistId) {
      openApp();
    }
  </script>
</body>
</html>
