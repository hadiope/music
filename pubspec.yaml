name: iranseda
description: Iran Seda - a music streaming app built with Flutter & Supabase.
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Backend / Auth / Storage
  supabase_flutter: ^2.5.6

  # Audio
  just_audio: ^0.9.40
  audio_service: ^0.18.15
  just_audio_background: ^0.0.1-beta.13

  # UI / UX
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  smooth_page_indicator: ^1.1.0

  # Utils
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  shared_preferences: ^2.2.3
  file_picker: ^8.0.0
  in_app_update: ^4.2.1
  intl: ^0.20.2
  app_links: ^7.2.1
  # NOTE: on_audio_query removed — incompatible with current AGP (namespace error).
dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/banner_main.png
    - assets/images/app_icon.png
    - assets/images/app_icon_fg.png
    - assets/images/login_logo.png
