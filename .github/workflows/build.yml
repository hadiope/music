name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # دکمه اجرای دستی از تب Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # Build the Android platform files inside a temp empty dir, then copy them
      # into our repo. This avoids `flutter create .` failing on an existing
      # project layout.
      - name: Generate Android platform files
        run: |
          set -e
          TMP=$(mktemp -d)
          cd "$TMP"
          flutter create --platforms=android --project-name iranian_spotify myapp
          cd myapp
          # Copy generated android/ back into the checked-out repo
          cp -r android "$GITHUB_WORKSPACE/android"
          echo "android platform files copied"

      - name: Set app name to Iranian Spotify
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          sed -i 's/android:label="[^"]*"/android:label="Iranian Spotify"/' "$MANIFEST"
          echo "label set"

      - name: Set minSdkVersion to 23 (required by audio packages)
        run: |
          for f in android/app/build.gradle android/app/build.gradle.kts; do
            if [ -f "$f" ]; then
              sed -i -E 's/(minSdkVersion|minSdk ?=)[^0-9]*[0-9]+/\1 23/g' "$f"
            fi
          done
          echo "minSdk patched"

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: iranian-spotify-apk
          path: build/app/outputs/flutter-apk/app-release.apk
