name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # Decode the production keystore from the GitHub Secret (handled in the
      # signing step below; kept here as a no-op note).
      - name: Keystore placeholder
        run: echo "keystore decoded inside the signing step"

      # Generate the Android platform files IN PLACE
      - name: Generate Android platform files
        run: |
          set -e
          flutter create --platforms=android --org ir.iranseda .

      # Force the exact applicationId / namespace / app label requested
      - name: Set package id and app name
        run: |
          set -e
          python3 - <<'PY'
          import re, os, glob
          PKG = "ir.iranseda.hadi"
          LABEL = "iran seda"
          # 1) app/build.gradle(.kts): applicationId + namespace
          for p in ["android/app/build.gradle.kts", "android/app/build.gradle"]:
              if os.path.isfile(p):
                  s = open(p, encoding="utf-8").read()
                  s = re.sub(r'applicationId\s*=\s*".*?"', f'applicationId = "{PKG}"', s)
                  s = re.sub(r'applicationId\s+".*?"', f'applicationId "{PKG}"', s)
                  s = re.sub(r'namespace\s*=\s*".*?"', f'namespace = "{PKG}"', s)
                  s = re.sub(r'namespace\s+".*?"', f'namespace "{PKG}"', s)
                  open(p, "w", encoding="utf-8").write(s)
                  print("patched", p)
          # 2) AndroidManifest: android:label
          mf = "android/app/src/main/AndroidManifest.xml"
          if os.path.isfile(mf):
              s = open(mf, encoding="utf-8").read()
              s = re.sub(r'android:label="[^"]*"', f'android:label="{LABEL}"', s, count=1)
              open(mf, "w", encoding="utf-8").write(s)
              print("patched label in manifest")
          # 3) Move MainActivity to the new package path
          old = glob.glob("android/app/src/main/kotlin/**/MainActivity.kt", recursive=True)
          newdir = "android/app/src/main/kotlin/ir/iranseda/hadi"
          os.makedirs(newdir, exist_ok=True)
          if old:
              content = open(old[0], encoding="utf-8").read()
              content = re.sub(r'package\s+[\w.]+', f'package {PKG}', content)
              open(os.path.join(newdir, "MainActivity.kt"), "w", encoding="utf-8").write(content)
              # remove stale package dirs (example)
              for f in old:
                  if os.path.abspath(f) != os.path.abspath(os.path.join(newdir, "MainActivity.kt")):
                      os.remove(f)
              print("MainActivity moved to", newdir)
          PY
          echo "package id set to ir.iranseda.hadi, label 'iran seda'"

      # Accept Android SDK licenses + ensure platform is installed.
      # Writing license files directly is more reliable on CI than `sdkmanager --licenses`.
      - name: Accept SDK licenses and install platform
        run: |
          set -e
          mkdir -p "$ANDROID_HOME/licenses"
          # Android SDK Preview License + General license accepted
          echo -e "8933bad161af4178b1185d1a37fbf41ea5269c55\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > "$ANDROID_HOME/licenses/android-sdk-license"
          echo -e "84831b9409646a918e30573bab4c9c91346d8abd\n504667f4c0de7af1a06de9e8bdd43f4fae5d20da\n" > "$ANDROID_HOME/licenses/android-sdk-preview-license"
          cat "$ANDROID_HOME/licenses/android-sdk-license"
          # Install platform 36 (required by file_picker 8) if missing
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" || true

      # Copy custom launcher icons (no adaptive XML — avoids AAPT missing-drawable errors)
      - name: Apply custom app icon
        run: |
          set -e
          ICONS=assets/icons
          if [ -d "$ICONS" ]; then
            for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
              if [ -d "$ICONS/mipmap-$d" ]; then
                mkdir -p "android/app/src/main/res/mipmap-$d"
                cp -f "$ICONS/mipmap-$d/"* "android/app/src/main/res/mipmap-$d/" 2>/dev/null || true
              fi
            done
            rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml 2>/dev/null || true
            rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml 2>/dev/null || true
            echo "icons applied"
          else
            echo "no assets/icons found, keeping default icon"
          fi

      # Merge required manifest entries (permissions + audio_service) from reference file
      - name: Merge manifest permissions
        run: |
          set -e
          python3 .github/workflows/merge_manifest.py

      # Decode keystore from secret BEFORE running sign_apk.py so the script
      # can find it at android/app/keystore.jks
      - name: Decode keystore from secret
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks
            echo "keystore decoded -> android/app/keystore.jks ($(wc -c < android/app/keystore.jks) bytes)"
          else
            echo "no keystore secret, building debug-signed"
          fi

      # Set SDK versions + inject release signing (reads KEYSTORE_* from env)
      - name: Set SDK versions + signing config
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          python3 .github/workflows/sign_apk.py
          echo "sdk configured + signing injected"

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (release, signed)
        run: |
          set -e
          cd android
          if [ -f keystore.jks ]; then
            ./gradlew assembleRelease --no-daemon \
              -Pandroid.injected.signing.store.file=$(pwd)/app/keystore.jks \
              -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
          else
            ./gradlew assembleRelease --no-daemon
          fi
          cd ..
          APK=build/app/outputs/flutter-apk/app-release.apk
          ALT=android/app/build/outputs/apk/release/app-release.apk
          if [ -f "$APK" ]; then
            echo "APK built and signed: $(ls -la $APK | awk '{print $5}') bytes"
          elif [ -f "$ALT" ]; then
            mkdir -p build/app/outputs/flutter-apk
            cp "$ALT" "$APK"
            echo "APK built and signed (from gradle path): $(ls -la $APK | awk '{print $5}') bytes"
          else
            echo "APK not found, failing"
            exit 1
          fi

      - name: Upload APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: iranian-spotify-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      # Publish the APK as a GitHub Release asset so it can be downloaded
      # directly from a phone browser WITHOUT logging in (public repo).
      - name: Publish APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Iranian Sedà - Latest APK
          body: |
            آخرین نسخه‌ی اپلیکیشن Iranian Sedà
            فایل app-release.apk رو دانلود و نصب کن.
          files: build/app/outputs/flutter-apk/app-release.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
