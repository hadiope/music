name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # دکمه اجرای دستی از تب Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create platform folders
        run: flutter create .

      - name: Set app name to Iranian Spotify
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          sed -i 's/android:label="[^"]*"/android:label="Iranian Spotify"/' "$MANIFEST"
          echo "----- label line -----"
          grep 'android:label' "$MANIFEST" || true

      - name: Set minSdkVersion to 23 (required by audio packages)
        run: |
          GRADLE=android/app/build.gradle
          if [ -f "$GRADLE" ]; then
            sed -i 's/minSdkVersion .*/minSdkVersion 23/' "$GRADLE"
            sed -i 's/minSdk = .*/minSdk = 23/' "$GRADLE"
          fi
          GRADLE_KTS=android/app/build.gradle.kts
          if [ -f "$GRADLE_KTS" ]; then
            sed -i 's/minSdk = .*/minSdk = 23/' "$GRADLE_KTS"
            sed -i 's/minSdkVersion(.*)/minSdk = 23/' "$GRADLE_KTS"
          fi
          echo "done"

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: iranian-spotify-apk
          path: build/app/outputs/flutter-apk/app-release.apk
