name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # دکمه اجرای دستی از تب Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # Decode the production keystore from the GitHub Secret
      - name: Decode signing keystore
        run: |
          set -e
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/harmony_release.keystore
          echo "keystore decoded: $(ls -la /tmp/harmony_release.keystore | awk '{print $5}') bytes"

      # Generate the Android platform files (creates android/ with a valid Manifest)
      - name: Generate Android platform files
        run: |
          set -e
          TMP=$(mktemp -d)
          cd "$TMP"
          flutter create --platforms=android --project-name iranian_spotify myapp
          cd myapp
          cp -r android "$GITHUB_WORKSPACE/android"
          echo "android platform files copied"

      # Copy the custom launcher icons into the freshly generated android/
      - name: Apply custom app icon
        run: |
          set -e
          ICONS=assets/icons
          if [ -d "$ICONS" ]; then
            for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
              if [ -d "$ICONS/mipmap-$d" ]; then
                mkdir -p "android/app/src/main/res/mipmap-$d"
                cp -f "$ICONS/mipmap-$d/"* "android/app/src/main/res/mipmap-$d/" 2>/dev/null || true
              fi
            done
            mkdir -p "android/app/src/main/res/mipmap-anydpi-v26"
            cp -f "$ICONS/mipmap-anydpi-v26/"* "android/app/src/main/res/mipmap-anydpi-v26/" 2>/dev/null || true
            mkdir -p "android/app/src/main/res/values"
            cp -f "$ICONS/ic_launcher_background.xml" "android/app/src/main/res/values/" 2>/dev/null || true
            echo "icons applied"
          else
            echo "no assets/icons found, keeping default icon"
          fi

      - name: Set app name to Iranian Spotify
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          if [ -f "$MANIFEST" ]; then
            sed -i 's/android:label="[^"]*"/android:label="Iranian Spotify"/' "$MANIFEST"
            echo "label set"
          else
            echo "Manifest not found, skipping label set"
          fi

      - name: Set minSdkVersion to 23 (required by audio packages)
        run: |
          for f in android/app/build.gradle android/app/build.gradle.kts; do
            if [ -f "$f" ]; then
              sed -i -E 's/(minSdkVersion|minSdk ?=)[^0-9]*[0-9]+/\1 23/g' "$f"
            fi
          done
          echo "minSdk patched"

      # Inject signing config into build.gradle so the APK is properly signed
      - name: Configure signing in build.gradle
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          set -e
          python3 "$GITHUB_WORKSPACE/sign_apk.py"
          echo "signing configured"

      - name: Get dependencies
        run: flutter pub get

      - name: Build signed APK (release)
        run: |
          set -e
          flutter build apk --release
          APK=build/app/outputs/flutter-apk/app-release.apk
          if [ -f "$APK" ]; then
            echo "APK built and signed: $(ls -la $APK | awk '{print $5}') bytes"
          else
            echo "APK not found, failing"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: iranian-spotify-apk
          path: build/app/outputs/flutter-apk/app-release.apk
